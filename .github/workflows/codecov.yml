name: Codecov

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - release-*

permissions:
  contents: read
  pull-requests: write

env:
  TZ: "Europe/Amsterdam"

jobs:
  backend:
    name: Backend coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: "true"
    steps:
      # Free up runner disk space, so that our job has enough space to run
      # https://dev.to/mathio/squeezing-disk-space-from-github-actions-runners-an-engineers-guide-3pjg
      - name: Free up runner disk space
        working-directory: /
        run: >
          df -h
          &&
          echo "Freeing up disk space..."
          &&
          sudo rm -rf
          /opt/az
          /opt/google
          /opt/hostedtoolcache
          /opt/microsoft
          /usr/lib/google-cloud-sdk
          /usr/lib/jvm
          /usr/local/.ghcup
          /usr/local/julia*
          /usr/local/lib/android
          /usr/local/share/chromium
          /usr/local/share/powershell
          /usr/share/dotnet
          /usr/share/swift
          &&
          df -h
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Branch coverage requires Rust nightly: https://github.com/taiki-e/cargo-llvm-cov/issues/8
      - name: Setup Rust Nightly
        shell: bash
        run: >
          rustup update nightly-2026-02-21 &&
          rustup default nightly-2026-02-21
      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: "backend -> target"
          cache-bin: "false"
      - name: Install Binstall
        uses: cargo-bins/cargo-binstall@1800853f2578f8c34492ec76154caef8e163fbca # main
      - name: Install cargo-llvm-cov
        run: cargo binstall cargo-llvm-cov
      - name: Install Nextest
        run: cargo binstall cargo-nextest
      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --branch --profile ci --features embed-typst,airgap-detection --cobertura --output-path ./target/llvm-cov-target/codecov.json
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: Backend Nextest Coverage
          files: backend/target/llvm-cov-target/codecov.json
          disable_search: true
          fail_ci_if_error: true
      - name: Report disk space
        run: df -h

  frontend:
    name: Frontend coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install pnpm
        run: >
          npm install --global corepack@latest &&
          corepack enable &&
          corepack prepare pnpm@latest-10 --activate
      - name: Install dependencies
        run: pnpm install
      - name: Run Vite build to report bundle size
        run: pnpm vite build --config vite.config.ts
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Run tests with coverage
        run: pnpm vitest run --coverage
        env:
          CHROMIUM_CHANNEL: chrome
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: Frontend Vitest Coverage
          files: frontend/coverage/coverage-final.json
          disable_search: true
          fail_ci_if_error: true
