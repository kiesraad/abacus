name: Track PDF model changes

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  TZ: "Europe/Amsterdam"

jobs:
  diff:
    name: Diff PDFs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.base_ref || 'main' }}
      # The base ref may not have a rust-toolchain.toml yet, so fall back to stable.
      - name: Setup Rust
        shell: bash
        run: if [ -f rust-toolchain.toml ]; then rustup toolchain install; else rustup update stable && rustup default stable; fi
      - name: Cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: "backend -> target"
      - name: Generate PDFs
        run: cargo run --bin gen-pdf --features embed-typst -- --directory base
      - name: Switch to current branch
        uses: actions/checkout@v7.0.0
        with:
          clean: false
      - name: Setup Rust for current branch
        run: rustup toolchain install
      - name: Generate PDFs on the current branch
        run: cargo run --bin gen-pdf --features embed-typst -- --directory head
      - name: Install diff-pdf
        run: sudo apt-get update && sudo apt-get install -y diff-pdf-wx
      - name: Generate PDF diff summary
        id: diff_summary
        uses: actions/github-script@v9
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        with:
          script: require('.github/workflows/scripts/pdf-diff.js').pdfDiff({ core });
      - name: Upload diff artifacts
        id: artifact-upload
        if: ${{ steps.diff_summary.outputs.diff_found == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: pdf-diffs
          path: backend/tmp-pdf-gen/diffs/
      - name: Add diff download link to job summary
        if: ${{ steps.diff_summary.outputs.diff_found == '1' }}
        run: |
          url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.artifact-upload.outputs.artifact-id }}"
          echo "[Download ZIP file containing PDF files with the visual differences]($url)" >> "$GITHUB_STEP_SUMMARY"
