name: Sigrid PR Feedback

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sigridci:
    if: "!github.event.pull_request.head.repo.fork"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Sigrid CI
        uses: Software-Improvement-Group/sigridci@8f05c5bd3d3a90a9972faca536ffab14749c4968 # main
        with:
          customer: kiesraad
          system: abacus
          convert: rust
          capability: maintainability,osh,security
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
      - name: "Sigrid feedback to job summary"
        if: always()
        run: |
          for feedback in sigrid-ci-output/*feedback.md; do
            cat "$feedback" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
          done
