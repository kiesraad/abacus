name: Sigrid PR Feedback

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  sigridci:
    if: "!github.event.pull_request.head.repo.fork"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Sigrid CI
        uses: Software-Improvement-Group/sigridci@e1f6c2571641f0ec2f7e29bbd90db8cd4fb7f54e # main
        with:
          customer: kiesraad
          system: abacus
          convert: rust
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
      - name: "Sigrid PR feedback"
        uses: mshick/add-pr-comment@64b8e914979889d746c99dea15a76e77ef64580a # v3.10.0
        if: always()
        with:
          message-id: sigrid
          message-path: sigrid-ci-output/feedback.md
