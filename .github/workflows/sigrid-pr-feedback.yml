name: Sigrid PR Feedback

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sigridci:
    if: "!github.event.pull_request.head.repo.fork"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Sigrid CI
        uses: Software-Improvement-Group/sigridci@b475df83e9b6cc4e45ad1df8c3236e896e6c995a # main
        with:
          customer: kiesraad
          system: abacus
          convert: rust
          capability: maintainability,osh,security
        env:
          SIGRID_CI_TOKEN: "${{ secrets.SIGRID_CI_TOKEN }}"
      - name: "Sigrid feedback to job summary"
        if: always()
        run: |
          for feedback in sigrid-ci-output/*feedback.md; do
            cat "$feedback" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
          done
