languages:
  - name: "css"
  - name: "sqlite"
    production:
      include:
        - ".*/migrations/.*[.]sql"
    test:
      include:
        - ".*/fixtures/.*[.]sql"

  - name: "rust"
    production:
    test:
      include:
        - ".*/backend/apportionment/src/test_helpers.rs"
        - ".*/backend/apportionment/fuzz/.*[.]rs"
        - ".*/gen-test-gsb-election[.]rs"
        - ".*/test_data_gen/.*[.]rs"
        - ".*/typst_tests[.]rs"
        - ".*/backend/fuzz/.*[.]rs"

  - name: "typescript"
    production:
    test:
      include:
        - ".*/frontend/[.]storybook/.*"
        - ".*/frontend/.*[.]e2e[.]ts"
        - ".*/frontend/.*.stories[.]tsx"
        - ".*/frontend/src/components/error/NotAvailableInMock[.]tsx"
        - ".*/frontend/src/features/dev/.*"
        - ".*/frontend/.*/testing/.*"
        - ".*/frontend/e2e-tests/.*"
    generated:
      include:
        - ".*/frontend/.*/generated/.*[.]ts"

exclude:
  - ".*/backend/[.]env"
  - ".*/backend/[.]sqlx/.*"
  - ".*/backend/src/bin/gen-.*[.]rs"
  - ".*/documentatie/.*"
  - ".*/frontend/scripts/.*"
  - ".*/packaging/.*"

dependencychecker:
  blocklist:
    - "abacus"
    - "abacus-fuzz"
    - "apportionment"
    - "apportionment-fuzz"
  transitive: true
  exclude:
    # Marvin Attack on RSA crate, which we do not use (Cargo weak dependency, https://github.com/rust-lang/cargo/issues/10801)
    - vulnerability: "CVE-2023-49092"

architecture:
  enabled: true

thirdpartyfindings:
  enabled: true
